# ██║  ██║╚██╗ ██╔╝██╔══██╗██╔══██╗██║     ██╔══██╗████╗  ██║██╔══██╗
# ███████║ ╚████╔╝ ██████╔╝██████╔╝██║     ███████║██╔██╗ ██║██║  ██║
# ██╔══██║  ╚██╔╝  ██╔═══╝ ██╔══██╗██║     ██╔══██║██║╚██╗██║██║  ██║
# ██║  ██║   ██║   ██║     ██║  ██║███████╗██║  ██║██║ ╚████║██████╔╝
# ╚═╝  ╚═╝   ╚═╝   ╚═╝     ╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝╚═╝  ╚═══╝╚═════╝

# ┌─────────────────────────────────────────┐
# │              MONITOR                    │
# └─────────────────────────────────────────┘
monitor = eDP-1,1920x1200@144,0x0,1.33

# ┌─────────────────────────────────────────┐
# │           ENVIRONMENT VARIABLES         │
# └─────────────────────────────────────────┘
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ┌─────────────────────────────────────────┐
# │              AUTOSTART                  │
# └─────────────────────────────────────────┘

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = sleep 0.5 && waybar
exec-once = swaync
exec-once = hypridle
exec-once = ~/scripts/wallpaper.sh

# ┌─────────────────────────────────────────┐
# │              PROGRAMS                   │
# └─────────────────────────────────────────┘
$terminal = kitty
$menu     = wofi --show drun
$browser  = firefox
$files    = kitty -e yazi

# ┌─────────────────────────────────────────┐
# │              LOOK AND FEEL              │
# └─────────────────────────────────────────┘

general {
    gaps_in             = 4
    gaps_out            = 6
    border_size         = 0
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)
    resize_on_border    = true
    allow_tearing       = false
    layout              = dwindle
}

decoration {
    rounding       = 20
    rounding_power = 2
    active_opacity   = 1.0
    inactive_opacity = 0.82

    shadow {
        enabled      = true
        range        = 6
        render_power = 2
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled           = true
        size              = 12
        passes            = 3
        vibrancy          = 0.2
        new_optimizations = true
        xray              = false
    }
}

animations {
    enabled = yes

    bezier = snappy,   0.23, 1,    0.32, 1
    bezier = smooth,   0.65, 0.05, 0.36, 1
    bezier = linear,   0,    0,    1,    1
    bezier = overshoot,0.05, 0.9,  0.1,  1.05

    animation = windows,    1, 3,   snappy
    animation = windowsIn,  1, 3,   overshoot, popin 80%
    animation = windowsOut, 1, 2,   snappy,    popin 80%
    animation = fade,       1, 2,   linear
    animation = layers,     1, 3,   snappy
    animation = layersIn,   1, 3,   snappy,  fade
    animation = layersOut,  1, 2,   linear,  fade
    animation = workspaces, 1, 3,   smooth,  slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    animate_manual_resizes   = false
    enable_swallow           = true
    swallow_regex            = ^(kitty)$
    focus_on_activate        = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    vfr                      = true
}

# ┌─────────────────────────────────────────┐
# │              INPUT                      │
# └─────────────────────────────────────────┘

input {
    kb_layout  = us
    kb_options = caps:capslock
    follow_mouse = 1
    sensitivity  = 0
    repeat_rate  = 50
    repeat_delay = 240

    touchpad {
        natural_scroll     = true
        tap-to-click       = true
        drag_lock          = true
        scroll_factor      = 0.8
        disable_while_typing = true
    }
}

# ┌─────────────────────────────────────────┐
# │           SMART GAPS                    │
# └─────────────────────────────────────────┘
workspace = w[t1], gapsout:5, gapsin:4
workspace = f[1],  gapsout:5, gapsin:4

# ┌─────────────────────────────────────────┐
# │              KEYBINDINGS                │
# └─────────────────────────────────────────┘
$mod = SUPER

# Core
bind = $mod, Return,    exec,         $terminal
bind = $mod, B,         exec,         $browser
bind = $mod, E,         exec,         $files
bind = $mod, Space,     exec,         $menu
bind = $mod, W,         killactive
bind = $mod, F,         togglefloating
bind = $mod, Tab,       cyclenext
bind = $mod SHIFT, Tab, cyclenext,    prev
bind = $mod, P,         pseudo
bind = $mod, J,         layoutmsg,    togglesplit
bind = $mod SHIFT, L,   exec,         hyprlock
bind = $mod SHIFT, W,   exec,         ~/scripts/wallpaper.sh $(zenity --file-selection --file-filter="Images | *.png *.jpg *.jpeg")

# Exit
bind = $mod SHIFT, E,   exec,         hyprctl dispatch exit

# Focus
bind = $mod, H,    movefocus, l
bind = $mod, L,    movefocus, r
bind = $mod, K,    movefocus, u
bind = $mod, J,    movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize
binde = $mod CTRL, right, resizeactive,  30 0
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, up,    resizeactive,  0 -30
binde = $mod CTRL, down,  resizeactive,  0  30

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mod, minus,       togglespecialworkspace, scratchpad
bind = $mod SHIFT, minus, movetoworkspace,        special:scratchpad

# Mouse
bind  = $mod, mouse_down, workspace, e+1
bind  = $mod, mouse_up,   workspace, e-1
bindm = $mod, mouse:272,  movewindow
bindm = $mod, mouse:273,  resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous

# ┌─────────────────────────────────────────┐
# │           WINDOW RULES                  │
# └─────────────────────────────────────────┘
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = kitty-btop
    match:class = kitty-btop
    float = true
    size = 800 500
    center = true
}

windowrule {
    name = float-signal
    match:class = Signal
    float = true
    size = 1000 700
    center = true
}

