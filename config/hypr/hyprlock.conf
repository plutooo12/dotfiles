source = $HOME/.config/hypr/mocha.conf

$accent = $mauve
$font = Inter

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

# BACKGROUND (Frosted Glass Effect)
background {
    monitor =
    path = /home/plutoo12/.config/backgrounds/shaded.png   # Fixed: Absolute path replaces the '~'
    blur_passes = 3                           
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.75                         
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME (Centered)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text
    font_size = 95
    font_family = Inter Bold
    position = 0, 130
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# DATE
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = $text
    font_size = 22
    font_family = Inter Light
    position = 0, 45
    halign = center
    valign = center
    shadow_passes = 1
}

# USER AVATAR
image {
    monitor =
    path = ~/.face
    size = 90
    border_size = 2
    border_color = $accent
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 1
}

# INPUT FIELD (Transparent Glassmorphism)
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true
    
    outer_color = rgba(203,166,247,0.5)      
    inner_color = rgba(30,30,46,0.3)         
    font_color = $text
    font_family = Inter
    
    fade_on_empty = false                    
    
    # FIXED: Double-hash '##' tells Hyprlock to treat this as a literal color string, not a comment!
    placeholder_text = <span font_family="Inter" foreground="##cdd6f4"><i>󰌾  Enter Password...</i></span>
    hide_input = false
    
    check_color = rgba(203,166,247,1.0)
    fail_color = rgba(243,139,168,1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(249,226,175,1.0)
    position = 0, -130
    halign = center
    valign = center
}
